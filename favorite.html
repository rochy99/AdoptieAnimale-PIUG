<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetAdopt - Favorite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">PetAdopt</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="caini.html">Câini</a></li>
                    <li class="nav-item"><a class="nav-link" href="pisici.html">Pisici</a></li>
                    <li class="nav-item"><a class="nav-link active" href="favorite.html">Favorite</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 100px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Animalele mele favorite</h2>
            <button class="btn btn-warning" onclick="clearAllFavorites()">Golește toată lista</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Poză</th>
                        <th>Nume</th>
                        <th>Rasă</th>
                        <th class="text-center">Acțiune</th>
                    </tr>
                </thead>
                <tbody id="favoritesTableBody">
                    </tbody>
            </table>
        </div>

        <div id="noFavoritesMsg" class="alert alert-info d-none text-center">
            Nu ai adăugat încă niciun animal la favorite. 
            <br><a href="index.html" class="alert-link">Începe căutarea aici!</a>
        </div>
    </main>

    <script src="js/favorites.js"></script>
</body>
</html>
