<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetAdopt - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">PetAdopt</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="caini.html">Câini</a></li>
                    <li class="nav-item"><a class="nav-link" href="pisici.html">Pisici</a></li>
                    <li class="nav-item"><a class="nav-link" href="favorite.html">Favorite</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
                <form class="d-flex" role="search">
                    <input id="searchInput" class="form-control me-2" type="search" placeholder="Caută un animal..." aria-label="Search">
                    <button id="searchButton" class="btn" type="button">Cauta</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 100px;">
        <div class="text-center mb-5">
            <h1>Bun venit la PetAdopt!</h1>
            <p>Găsește-ți viitorul prieten blănos printre micuții de mai jos.</p>
            
            <div class="mt-4">
                <a href="pisici.html" class="btn btn-success btn-lg mx-2">Vezi Pisici</a>
                <a href="caini.html" class="btn btn-success btn-lg mx-2">Vezi Câini</a>
            </div>
        </div>

        <section class="mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8 mb-4">
                    <h3 class="text-center mb-3">Povestea noastră</h3>
                    <div class="ratio ratio-16x9 shadow rounded overflow-hidden">
                        <video controls>
                            <source src="assets/video/cat-vid-1.mp4" type="video/mp4">
                            Browser-ul tău nu suportă tag-ul video.
                        </video>
                    </div>
                </div>

                <div class="col-md-8 mb-4">
                    <h3 class="text-center mb-3">Prietenii noștri fericiți</h3>
                    <div class="ratio ratio-16x9 shadow rounded overflow-hidden">
                        <video controls>
                            <source src="assets/video/dog-vid-2.mp4" type="video/mp4">
                            Browser-ul tău nu suportă tag-ul video.
                        </video>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
